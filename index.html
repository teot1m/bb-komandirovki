<!DOCTYPE html>
<html lang="uk">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Відрядження — Модуль недоступний</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #667085;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --radius: 16px;
      --gap: 16px;
      --fs-sm: 14px;
      --fs-md: 17px;
      --fs-lg: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    .stub-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--gap);
    }

    .stub-card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(24px, 5vw, 40px);
      text-align: center;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .06);
    }

    .stub-emoji {
      font-size: clamp(48px, 10vw, 64px);
      line-height: 1;
      margin-bottom: .5rem;
    }

    .stub-card h1 {
      font-size: var(--fs-lg);
      margin: .25rem 0 .75rem;
      color: var(--text);
    }

    .stub-card p {
      color: var(--muted);
      font-size: var(--fs-md);
      line-height: 1.5;
      margin: 0 0 1.25rem;
    }

    .stub-link {
      display: inline-block;
      padding: .85rem 1.5rem;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      font-size: var(--fs-md);
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .stub-link:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, .25);
    }

    .stub-hint {
      margin-top: 1rem;
      font-size: var(--fs-sm);
      color: var(--muted);
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="stub-wrap">
    <div class="stub-card">
      <div class="stub-emoji">✈️</div>
      <h1>Модуль більше недоступний тут</h1>
      <p>Ми повністю перейшли в окремий додаток. Щоб скористатись відрядженнями, перейдіть за посиланням:</p>
      <a class="stub-link" href="https://factory.faringos.tech" target="_blank" rel="noopener noreferrer">
        Відкрити Faringos Factory →
      </a>
      <div class="stub-hint">factory.faringos.tech</div>
    </div>
  </div>
</body>
</html>
